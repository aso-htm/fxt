<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <title>My Static App</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        h1 {
            color: #0078d4;
        }
    </style>
</head>
<body>
    <h1>こんにちは！Azure Static Web Apps 🎉</h1>
    <p>これは VS Code で作った最初の静的アプリです。</p>
 <h2>名前を登録</h2>
<input id="name" placeholder="名前">
<button onclick="send()">登録</button>

<h2>登録済みデータ</h2>
<button onclick="load()">再読み込み</button>
<ul id="list"></ul>

<script>
const apiBase = "https://fxt-test-func-argfg8g2aycjg4he.eastasia-01.azurewebsites.net/api";

async function send() {
    const name = document.getElementById("name").value;

    await fetch(`${apiBase}/InsertData`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name })
    });

    alert("登録しました！");
    load();
}

async function load() {
    const res = await fetch(`${apiBase}/GetData`);
    const data = await res.json();

    const ul = document.getElementById("list");
    ul.innerHTML = "";

    data.forEach(item => {
        const li = document.createElement("li");
        li.textContent = `${item.Id}: ${item.Name} (${item.CreatedAt})`;
        ul.appendChild(li);
    });
}
</script>

</body>
</html>
