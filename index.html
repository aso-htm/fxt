<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <title>My Static App</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        h1 {
            color: #0078d4;
        }
    </style>
</head>
<body>
    <h1>こんにちは！Azure Static Web Apps 🎉</h1>

    <div id="before-login">
        <button onclick="login()">Microsoftでログイン</button></p>
    </div>
    <div id="after-login" style="display:none;">
        <h1 id="welcome"></h1>
        
 <h2>名前を登録</h2>
<input id="name" placeholder="名前">
<button onclick="send()">登録</button>

<h2>登録済みデータ</h2>
<button onclick="load()">再読み込み</button>
<ul id="list"></ul>

<h2>データダウンロード</h2>
<button id="download">CSVダウンロード</button>

<h2>ログアウト</h2>
        <button onclick="logout()">ログアウト</button>
    </div>


<script>

function login() {
    window.location.href = "/.auth/login/aad";
}

function logout() {
    window.location.href = "/.auth/logout";
}
const apiBase = "https://fxt-test-func-argfg8g2aycjg4he.eastasia-01.azurewebsites.net/api";



async function send() {
    const name = document.getElementById("name").value;

    await fetch(`${apiBase}/InsertData`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ Name: name })
    });

    alert("登録しました！");
    load();
}

async function load() {
    const res = await fetch(`${apiBase}/GetData`);
    const data = await res.json();

    const ul = document.getElementById("list");
    ul.innerHTML = "";

    data.forEach(item => {
        const li = document.createElement("li");
        li.textContent = `${item.Id}: ${item.Name} (${item.CreatedAt})`;
        ul.appendChild(li);
    });
}
async function checkUser() {
    const res = await fetch("/.auth/me");
    const data = await res.json();

    if (data && data.clientPrincipal) {
        const user = data.clientPrincipal; //ユーザ情報を取り出す
        document.getElementById("before-login").style.display = "none";
        document.getElementById("after-login").style.display = "block";
        document.getElementById("welcome").innerText =
            `こんにちは、${user.userDetails} さん！`;
    } else {
        console.log("未ログイン");
        document.getElementById("before-login").style.display = "block";
        document.getElementById("after-login").style.display = "none";
    }
}

document.getElementById("download").addEventListener("click", async () => {
  const res = await fetch("https://prod-00.eastasia.logic.azure.com:443/workflows/88f138bd92ea4209b79e03c5cd1b1db2/triggers/When_an_HTTP_request_is_received/paths/invoke?api-version=2016-10-01&sp=%2Ftriggers%2FWhen_an_HTTP_request_is_received%2Frun&sv=1.0&sig=w698Yepesl3ITqGjHDIjEsk5WSRiI3Mn0rL0hVqNwsU");
  const data = await res.json();

  const link = document.createElement("a");
  link.href = data.downloadUrl;
  link.download = "report.csv";
  link.click();
});

// ★ ログイン直後の Cookie 反映待ち
setTimeout(checkUser, 300);
</script>

</body>
</html>
